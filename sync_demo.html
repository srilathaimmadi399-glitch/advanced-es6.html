    <title>sync&async</title>
</head>
<body>
    <h2>sync/async</h2>
    <!--
    what is synchronous programming?
    ->js executes one at a time in the exact order it is written
    ->the next statement should wait for until 
    the current statements executes
    
    what is asynchoronous programming?
    ->js start the task and continues the executing
    the remaining code wothout waiting for that task to finish
    -->
    <script src="sync.js"></script>
    
</body>
