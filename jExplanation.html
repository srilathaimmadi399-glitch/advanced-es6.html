<!-- 
 Js-is a high level dynamic programming language
 used to make web pages interactive 
 or responsive
 HTML -> Structure 
 CSS -> Styling
 JS -> Functionality

 Exceution Flow:
                Source Code
                    |
                Interpreted
                    |
                Machine Execute one 
                line at a time with JIT(Just In Time compiler)
                    |
                Optimized Machine Code
JIT Definition:Is a Technique where code is complied
into machine code while the program is running
->Innstead of compiling everything beforehand
JIT Compiler:JIT Compiler Identifies Frequently Excuted code
("HOT code")
It complies that code into optimized machine code

JavaScripit(V8 Engine in chrome and node.js)

How js works in browser:
HTM;L file
|
Browser
|
HTML parser
|


-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie's Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <h1 class="logo">Foodie's</h1>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Delicious Food Delivered Fresh</h2>
            <p>Experience the taste of authentic cuisine made with love.</p>
            <a href="#" class="btn">Order Now</a>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="menu">
        <h2>Popular Dishes</h2>
        <div class="menu-container">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38" alt="Pizza">
                <h3>Cheese Pizza</h3>
                <p>$12.99</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
                <h3>Classic Burger</h3>
                <p>$9.99</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4" alt="Pasta">
                <h3>Italian Pasta</h3>
                <p>$14.99</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Foodie's Restaurant. All Rights Reserved.</p>
    </footer>

</body>
</html>
